[pytest]
# ---------------------------------------------------------------------------
# pytest configuration
# ---------------------------------------------------------------------------

# Add the project root to sys.path so `import bot` works without installing
# the package in editable mode.
pythonpath = .

testpaths = tests

# Show short test summaries for failures and errors
addopts =
    -v
    --tb=short
    -p no:cacheprovider

# Display warnings as errors to keep the codebase clean
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
